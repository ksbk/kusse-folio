<header class="site-header" id="site-header">
  <nav class="nav container">
    <a href="{% url 'home' %}" class="nav__brand">
      {% if site_settings.logo %}
        <img src="{{ site_settings.logo.url }}" alt="{{ site_settings.site_name }}" class="nav__logo">
      {% else %}
        <span class="nav__name">{{ site_settings.site_name }}</span>
      {% endif %}
    </a>

    <button class="nav__toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <ul class="nav__links">
      <li><a href="{% url 'project_list' %}" class="nav__link {% if request.resolver_match.url_name == 'project_list' or request.resolver_match.url_name == 'project_detail' %}is-active{% endif %}">Projects</a></li>
      <li><a href="{% url 'about' %}" class="nav__link {% if request.resolver_match.url_name == 'about' %}is-active{% endif %}">About</a></li>
      <li><a href="{% url 'services' %}" class="nav__link {% if request.resolver_match.url_name == 'services' %}is-active{% endif %}">Services</a></li>
      <li><a href="{% url 'contact' %}" class="nav__link nav__cta {% if request.resolver_match.url_name == 'contact' %}is-active{% endif %}">Contact</a></li>
    </ul>
  </nav>
</header>
