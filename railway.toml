# Railway deployment configuration for Kusse Folio
# https://docs.railway.com/reference/config-as-code
#
# Build:      Railpack (Railway default) auto-installs from requirements.txt,
#             then bakes static files into the image via buildCommand.
#             builder is omitted — Railway defaults to Railpack.
# Pre-deploy: migrations run once before the new container goes live.
# Start:      gunicorn only — no collectstatic or migrate at boot.
#
# NOTE: preDeployCommand runs in a separate ephemeral container. Do NOT use it
# for filesystem-persistent tasks (collectstatic belongs in buildCommand).

[build]
buildCommand = "python manage.py collectstatic --noinput"

[deploy]
preDeployCommand = "python manage.py migrate --noinput"
startCommand = "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
healthcheckPath = "/health/"
healthcheckTimeout = 300
